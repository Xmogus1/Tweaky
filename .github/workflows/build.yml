name: build
on: [ pull_request, push ]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build legit + cheat
        run: ./gradlew build
      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RenderOptimiser-jars
          path: |
            build/libs/*-legit.jar
            build/libs/*-cheat.jar
          compression-level: 0
      - name: generate nightly download link
        run: |
          echo "### Nightly Download Link" >> $GITHUB_STEP_SUMMARY
          echo "You can download the artifacts from this run here: [RenderOptimiser-jars.zip](https://nightly.link/${{ github.repository }}/workflows/build/${{ github.ref_name }}/RenderOptimiser-jars.zip)" >> $GITHUB_STEP_SUMMARY